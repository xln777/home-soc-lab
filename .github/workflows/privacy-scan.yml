name: Privacy scan

on:
  push:
  pull_request:

jobs:
  privacy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check public files for private values
        env:
          PRIVACY_SCAN_PATTERNS: ${{ secrets.PRIVACY_SCAN_PATTERNS }}
        run: python3 scripts/privacy-scan.py
